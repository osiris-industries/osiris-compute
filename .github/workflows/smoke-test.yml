name: smoke-test

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci --omit=dev
      - name: boot signaling router and probe endpoints
        run: |
          HOST=127.0.0.1 PORT=8081 node server.js &
          SRV=$!
          for i in $(seq 1 20); do
            curl -fsS http://127.0.0.1:8081/healthz >/dev/null 2>&1 && break
            sleep 1
          done
          echo "healthz -> $(curl -fsS http://127.0.0.1:8081/healthz)"
          curl -fsS http://127.0.0.1:8081/healthz | grep -q ok
          curl -fsS http://127.0.0.1:8081/ice | grep -q '"iceServers"'
          curl -fsS http://127.0.0.1:8081/ | grep -q '<title'
          kill $SRV
          echo "SMOKE OK"
